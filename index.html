<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TaskFlow Pro — Team Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7fb;--bg2:#ffffff;--bg3:#f1f3f8;
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --bd:#e2e8f0;--bdhv:#cbd5e1;
  --ind:#6366f1;--pur:#7c3aed;
  --rad:12px;--rad-lg:18px;--rad-xl:24px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --sh-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
}
.dark{
  --bg:#0b0f1a;--bg2:#111827;--bg3:#1a2235;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#475569;
  --bd:#1e293b;--bdhv:#2d3748;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdhv);border-radius:10px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{opacity:0;transform:translateX(28px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.93) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes float{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
@keyframes pulse-ring{0%{box-shadow:0 0 0 0 rgba(99,102,241,.4)}70%{box-shadow:0 0 0 10px rgba(99,102,241,0)}100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}
@keyframes count-up{from{opacity:0;transform:translateY(10px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes progress-fill{from{width:0%}to{width:var(--target-width)}}
@keyframes card-in{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes sidebar-glow{0%,100%{background:rgba(99,102,241,.12)}50%{background:rgba(99,102,241,.2)}}
@keyframes badge-pop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes drag-lift{from{transform:scale(1) rotate(0deg);box-shadow:none}to{transform:scale(1.04) rotate(1.5deg);box-shadow:0 16px 40px rgba(0,0,0,.18)}}
@keyframes modal-in{from{opacity:0;transform:scale(.88) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateX(32px) scale(.9)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
@keyframes skeleton{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes logo-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.fade-up{animation:fadeUp .45s cubic-bezier(.34,1.2,.64,1) both}
.fade-in{animation:fadeIn .3s ease both}

/* Checkbox animation */
input[type="checkbox"]{accent-color:#6366f1;cursor:pointer;transition:transform .15s}
input[type="checkbox"]:hover{transform:scale(1.2)}
input[type="checkbox"]:checked{animation:badge-pop .2s ease}

/* Stat card number animation */
.stat-num{animation:count-up .5s cubic-bezier(.34,1.4,.64,1) both}

/* Card hover with glow */
.card-hover{transition:transform .22s cubic-bezier(.34,1.2,.64,1),box-shadow .22s ease,border-color .22s ease}
.card-hover:hover{transform:translateY(-4px) scale(1.01);box-shadow:0 16px 48px rgba(0,0,0,.1),0 0 0 1px rgba(99,102,241,.15)}

/* Button ripple */
.btn-ripple{position:relative;overflow:hidden}
.btn-ripple::after{content:'';position:absolute;width:4px;height:4px;background:rgba(255,255,255,.5);border-radius:50%;transform:scale(0);animation:none;pointer-events:none}
.btn-ripple:active::after{animation:ripple .4s ease-out}

/* Sidebar active glow */
.sidebar-link.active{animation:sidebar-glow 3s ease infinite}

/* Dragging state */
.is-dragging{animation:drag-lift .15s ease forwards!important;z-index:999;cursor:grabbing!important}

/* Modal */
.modal{animation:modal-in .3s cubic-bezier(.34,1.15,.64,1)}
.modal-overlay{animation:fadeIn .18s ease}

/* Form field focus animation */
.input:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(99,102,241,.12);transform:translateY(-1px)}

/* Progress bar animated */
.prog-bar-fill{animation:progress-fill 1.2s cubic-bezier(.4,0,.2,1) both}

/* Notification dot pulse */
.notif-dot{animation:pulse-ring 2s cubic-bezier(.455,.03,.515,.955) infinite}

/* Logo float */
.logo-icon{animation:float 4s ease-in-out infinite}

/* Page transition */
.page-enter{animation:fadeUp .35s cubic-bezier(.34,1.1,.64,1) both}

/* Kanban column drop glow */
.kanban-col.drag-over{box-shadow:inset 0 0 0 2px #6366f1,0 0 24px rgba(99,102,241,.15)}

/* Base components */
.input{width:100%;padding:10px 14px;border:1.5px solid var(--bd);border-radius:11px;background:var(--bg2);color:var(--tx);font-size:14px;transition:border .2s,box-shadow .2s;outline:none;-webkit-appearance:none}
.input:focus{border-color:var(--ind);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.input::placeholder{color:var(--tx3)}
.btn{padding:9px 18px;border-radius:11px;font-size:13px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:7px;border:none;cursor:pointer;letter-spacing:.2px;line-height:1}
.btn-primary{background:linear-gradient(135deg,#6366f1,#7c3aed);color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.35);position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
.btn-primary:hover::before{background:rgba(255,255,255,.08)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(99,102,241,.45)}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--bg2);color:var(--tx2);border:1.5px solid var(--bd);transition:all .18s cubic-bezier(.34,1.1,.64,1)}
.btn-secondary:hover{background:var(--bg3);border-color:var(--bdhv);transform:translateY(-1px)}
.btn-secondary:active{transform:scale(.97)}
.btn-danger{background:#fee2e2;color:#dc2626;border:1.5px solid #fecaca;transition:all .18s}
.btn-danger:hover{background:#fecaca;transform:translateY(-1px)}
.btn-danger:active{transform:scale(.97)}
.card{background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rad-lg);box-shadow:var(--sh)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}

/* Sidebar */
.sidebar{height:100%;background:var(--bg2);border-right:1.5px solid var(--bd);display:flex;flex-direction:column;transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;flex-shrink:0}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:11px;font-size:13.5px;font-weight:500;color:var(--tx2);transition:all .15s;cursor:pointer;user-select:none;white-space:nowrap}
.sidebar-link:hover{background:var(--bg3);color:var(--tx)}
.sidebar-link.active{background:rgba(99,102,241,.12);color:#6366f1;font-weight:600}
.sidebar-icon{font-size:17px;min-width:22px;text-align:center;flex-shrink:0}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border-radius:22px;border:1.5px solid var(--bd);width:100%;max-width:500px;max-height:88vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.25);animation:scaleIn .3s cubic-bezier(.34,1.2,.64,1)}

/* Task card */
.task-card{background:var(--bg2);border:1.5px solid var(--bd);border-left:3px solid transparent;border-radius:13px;padding:13px 15px;transition:all .2s cubic-bezier(.34,1.1,.64,1);position:relative}
.task-card:hover{box-shadow:var(--sh-md);transform:translateX(3px);border-left-color:#6366f1}
.task-card.overdue{border-left-color:#ef4444!important}

/* Kanban */
.kanban-col{min-height:120px;border-radius:14px;padding:12px;border:2px dashed transparent;transition:all .2s;flex-shrink:0;width:272px}
.kanban-col.drag-over{border-color:var(--ind);background:rgba(99,102,241,.06)}

/* Navbar */
.navbar{height:62px;background:var(--bg2);border-bottom:1.5px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100;backdrop-filter:blur(14px)}

/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:11px 18px;border-radius:14px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:slideIn .35s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;max-width:340px;color:#fff;pointer-events:all}

/* Progress bar */
.prog-bar-wrap{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}

/* Mobile overlay */
.mobile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.mobile-sidebar{position:fixed;top:0;left:0;height:100%;z-index:250;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.mobile-sidebar.open{transform:translateX(0)}

/* Responsive */
@media(max-width:768px){
  .hide-mobile{display:none!important}
  .show-mobile{display:flex!important}
  .main-content{padding:16px!important}
  .stats-grid{grid-template-columns:1fr 1fr!important}
  .charts-grid{grid-template-columns:1fr!important}
  .projects-grid{grid-template-columns:1fr!important}
  .kanban-board{flex-direction:column!important}
  .kanban-col{width:100%!important}
  .login-left{display:none!important}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr!important}
  .modal{margin:0;border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:90vh}
  .modal-overlay{align-items:flex-end;padding:0}
}

/* Form label helper */
.flabel{display:block;font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.ferr{color:#ef4444;font-size:12px;margin-top:4px}

/* Profile tabs */
.tab-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:9px;border-radius:12px;font-size:13px;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:transparent;color:var(--tx2)}
.tab-btn.active{background:var(--bg2);color:var(--tx);box-shadow:var(--sh)}

/* Empty state */
.empty{text-align:center;padding:56px 20px;color:var(--tx3)}
.empty-icon{font-size:52px;margin-bottom:14px}
.empty-title{font-weight:700;font-size:17px;color:var(--tx2);margin-bottom:8px}

/* Syne font for headings */
h1,h2,h3,.syne{font-family:'Syne',sans-serif}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, createContext, useContext, useCallback } = React;

// ═══════════════════════════════════════════
// CONTEXTS
// ═══════════════════════════════════════════
const ThemeCtx = createContext();
const AuthCtx = createContext();
const DataCtx = createContext();
const ToastCtx = createContext();

const MOCK_USERS = [
  { _id:"u1", name:"Alex Johnson", email:"admin@taskflow.com", role:"admin", avatar:"", bio:"Product Manager & Team Lead", password:"admin123" },
  { _id:"u2", name:"Sarah Chen", email:"sarah@taskflow.com", role:"member", avatar:"", bio:"Frontend Developer", password:"member123" },
  { _id:"u3", name:"Marcus Williams", email:"marcus@taskflow.com", role:"member", avatar:"", bio:"Backend Engineer", password:"pass123" },
  { _id:"u4", name:"Priya Patel", email:"priya@taskflow.com", role:"member", avatar:"", bio:"UI/UX Designer", password:"pass123" },
];

const INIT_PROJECTS = [
  {_id:"p1",name:"TaskFlow Pro App",description:"Build complete task management platform with modern UI.",status:"active",priority:"high",color:"#6366f1",deadline:"2025-08-30",progress:65,owner:MOCK_USERS[0],members:[MOCK_USERS[0],MOCK_USERS[1],MOCK_USERS[2]],tags:["react","node"],createdAt:"2025-01-15"},
  {_id:"p2",name:"Mobile App Redesign",description:"Redesign mobile app with new brand guidelines and improved UX.",status:"active",priority:"high",color:"#8b5cf6",deadline:"2025-07-15",progress:40,owner:MOCK_USERS[0],members:[MOCK_USERS[0],MOCK_USERS[3]],tags:["design","mobile"],createdAt:"2025-02-01"},
  {_id:"p3",name:"API Gateway Migration",description:"Migrate legacy REST APIs to new GraphQL gateway.",status:"planning",priority:"medium",color:"#06b6d4",deadline:"2025-09-01",progress:15,owner:MOCK_USERS[0],members:[MOCK_USERS[0],MOCK_USERS[2]],tags:["backend","api"],createdAt:"2025-02-20"},
  {_id:"p4",name:"Analytics Dashboard",description:"Build real-time analytics dashboard with interactive charts.",status:"completed",priority:"low",color:"#10b981",deadline:"2025-03-01",progress:100,owner:MOCK_USERS[0],members:[MOCK_USERS[0],MOCK_USERS[1],MOCK_USERS[3]],tags:["analytics"],createdAt:"2024-12-01"},
  {_id:"p5",name:"Security Audit",description:"Comprehensive security audit and penetration testing.",status:"on-hold",priority:"high",color:"#ef4444",deadline:"2025-06-30",progress:25,owner:MOCK_USERS[0],members:[MOCK_USERS[0],MOCK_USERS[2]],tags:["security"],createdAt:"2025-01-10"},
];

const INIT_TASKS = [
  {_id:"t1",title:"Design authentication flow mockups",description:"Create high-fidelity Figma mockups for login, register, forgot password.",status:"completed",priority:"high",project:"p1",assignee:MOCK_USERS[3],createdBy:MOCK_USERS[0],dueDate:"2025-02-10",labels:["design","auth"]},
  {_id:"t2",title:"Implement JWT authentication backend",description:"Set up JWT with refresh tokens, bcrypt hashing, protected route middleware.",status:"completed",priority:"high",project:"p1",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-02-20",labels:["backend","auth"]},
  {_id:"t3",title:"Build React dashboard components",description:"Create reusable dashboard components: stat cards, charts, project list.",status:"in-progress",priority:"high",project:"p1",assignee:MOCK_USERS[1],createdBy:MOCK_USERS[0],dueDate:"2025-07-10",labels:["frontend"]},
  {_id:"t4",title:"Kanban drag-and-drop board",description:"Implement drag-and-drop task board with smooth animations and real-time updates.",status:"in-progress",priority:"critical",project:"p1",assignee:MOCK_USERS[1],createdBy:MOCK_USERS[0],dueDate:"2025-07-20",labels:["frontend","ux"]},
  {_id:"t5",title:"MongoDB schema design",description:"Design and implement MongoDB schemas for users, projects, tasks, comments.",status:"completed",priority:"medium",project:"p1",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-02-15",labels:["database"]},
  {_id:"t6",title:"REST API for project management",description:"Build all CRUD endpoints for projects with role-based access control.",status:"review",priority:"high",project:"p1",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-07-05",labels:["backend","api"]},
  {_id:"t7",title:"Write unit and integration tests",description:"Cover all API endpoints and critical frontend components.",status:"todo",priority:"medium",project:"p1",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-08-01",labels:["testing"]},
  {_id:"t8",title:"Deploy to Railway and Vercel",description:"Set up CI/CD pipeline and deploy frontend to Vercel, backend to Railway.",status:"todo",priority:"high",project:"p1",assignee:MOCK_USERS[0],createdBy:MOCK_USERS[0],dueDate:"2025-08-15",labels:["devops"]},
  {_id:"t9",title:"New onboarding flow screens",description:"Design 5-step onboarding wizard for new users.",status:"in-progress",priority:"high",project:"p2",assignee:MOCK_USERS[3],createdBy:MOCK_USERS[0],dueDate:"2025-07-25",labels:["design"]},
  {_id:"t10",title:"Update brand color system",description:"Migrate all UI components to new brand tokens.",status:"review",priority:"medium",project:"p2",assignee:MOCK_USERS[3],createdBy:MOCK_USERS[0],dueDate:"2025-07-15",labels:["design"]},
  {_id:"t11",title:"GraphQL schema definition",description:"Write GraphQL schema covering all entities with proper type resolvers.",status:"todo",priority:"high",project:"p3",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-08-01",labels:["backend"]},
  {_id:"t12",title:"Performance benchmarking",description:"Run load tests comparing REST vs GraphQL endpoint performance.",status:"todo",priority:"medium",project:"p3",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-08-20",labels:["backend","performance"]},
  {_id:"t13",title:"Fix critical security patch",description:"Critical vulnerability in auth middleware needs immediate patch.",status:"todo",priority:"critical",project:"p5",assignee:MOCK_USERS[2],createdBy:MOCK_USERS[0],dueDate:"2025-03-01",labels:["security","critical"]},
];

const INIT_COMMENTS = [
  {_id:"c1",task:"t4",author:MOCK_USERS[1],content:"Started on drag-and-drop. Using native HTML5 drag API for smooth performance.",createdAt:"2025-03-01T10:30:00"},
  {_id:"c2",task:"t4",author:MOCK_USERS[0],content:"Great! Handle optimistic UI updates so it feels instant.",createdAt:"2025-03-01T11:00:00"},
  {_id:"c3",task:"t3",author:MOCK_USERS[2],content:"API endpoints ready. Check Postman collection in /docs.",createdAt:"2025-02-28T09:00:00"},
];

// ── Theme Provider ──
function ThemeProvider({children}){
  const [dark,setDark]=useState(()=>localStorage.getItem("tf_theme")==="dark");
  useEffect(()=>{
    document.body.classList.toggle("dark",dark);
    localStorage.setItem("tf_theme",dark?"dark":"light");
  },[dark]);
  return <ThemeCtx.Provider value={{dark,toggle:()=>setDark(d=>!d)}}>
    <div data-dark={dark?'true':'false'}>{children}</div>
  </ThemeCtx.Provider>;
}
const useTheme=()=>useContext(ThemeCtx);

// ── Auth Provider ──
function AuthProvider({children}){
  const [user,setUser]=useState(null);
  const [loading,setLoading]=useState(true);
  useEffect(()=>{
    try{const s=sessionStorage.getItem("tf_user");if(s)setUser(JSON.parse(s));}catch{}
    setLoading(false);
  },[]);
  const login=(email,password)=>{
    const found=MOCK_USERS.find(u=>u.email===email&&u.password===password);
    if(!found)throw new Error("Invalid credentials");
    const{password:_,...safe}=found;
    setUser(safe);
    try{sessionStorage.setItem("tf_user",JSON.stringify(safe));}catch{}
    return safe;
  };
  const register=(data)=>{
    const newUser={_id:"u"+Date.now(),...data,role:data.role||"member",avatar:"",bio:""};
    const{password:_,...safe}=newUser;
    setUser(safe);
    try{sessionStorage.setItem("tf_user",JSON.stringify(safe));}catch{}
    return safe;
  };
  const logout=()=>{setUser(null);try{sessionStorage.removeItem("tf_user");}catch{}};
  const updateUser=(u)=>{const up={...user,...u};setUser(up);try{sessionStorage.setItem("tf_user",JSON.stringify(up));}catch{}};
  return <AuthCtx.Provider value={{user,loading,login,register,logout,updateUser}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

// ── Data Provider ──
function DataProvider({children}){
  const [projects,setProjects]=useState(INIT_PROJECTS);
  const [tasks,setTasks]=useState(INIT_TASKS);
  const [comments,setComments]=useState(INIT_COMMENTS);

  const recalc=(projectId,tlist)=>{
    const pts=(tlist||tasks).filter(t=>t.project===projectId);
    const prog=pts.length?Math.round((pts.filter(t=>t.status==="completed").length/pts.length)*100):0;
    setProjects(p=>p.map(pr=>pr._id===projectId?{...pr,progress:prog}:pr));
  };

  const createProject=(data,user)=>{
    const p={_id:"p"+Date.now(),...data,progress:0,owner:user,members:[user],createdAt:new Date().toISOString()};
    setProjects(pr=>[p,...pr]);return p;
  };
  const updateProject=(id,data)=>setProjects(p=>p.map(pr=>pr._id===id?{...pr,...data}:pr));
  const deleteProject=(id)=>{
    setProjects(p=>p.filter(pr=>pr._id!==id));
    setTasks(t=>t.filter(tk=>tk.project!==id));
  };

  const createTask=(data,user)=>{
    const t={_id:"t"+Date.now(),...data,createdBy:user,createdAt:new Date().toISOString()};
    const updated=[...tasks,t];setTasks(updated);
    setTimeout(()=>recalc(data.project,updated),0);
    return t;
  };
  const updateTask=(id,data)=>{
    let pid;
    setTasks(prev=>{
      const updated=prev.map(t=>{if(t._id===id){pid=t.project;return{...t,...data};}return t;});
      if(pid)setTimeout(()=>recalc(pid,updated),0);
      return updated;
    });
  };
  const deleteTask=(id)=>{
    let pid;
    setTasks(prev=>{
      const t=prev.find(t=>t._id===id);pid=t?.project;
      const updated=prev.filter(t=>t._id!==id);
      if(pid)setTimeout(()=>recalc(pid,updated),0);
      return updated;
    });
  };

  const addComment=(taskId,content,user)=>{
    const c={_id:"c"+Date.now(),task:taskId,author:user,content,createdAt:new Date().toISOString()};
    setComments(prev=>[...prev,c]);
  };
  const deleteComment=(id)=>setComments(prev=>prev.filter(c=>c._id!==id));

  return <DataCtx.Provider value={{projects,tasks,comments,createProject,updateProject,deleteProject,createTask,updateTask,deleteTask,addComment,deleteComment}}>
    {children}
  </DataCtx.Provider>;
}

// ── Toast Provider ──
function ToastProvider({children}){
  const [toasts,setToasts]=useState([]);
  const add=useCallback((msg,type="success")=>{
    const id=Date.now();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);
  const icons={success:"✓",error:"✕",warn:"⚠"};
  const colors={success:"#10b981",error:"#ef4444",warn:"#f59e0b"};
  return <ToastCtx.Provider value={{add}}>
    {children}
    <div className="toast-container">
      {toasts.map(t=>(
        <div key={t.id} className="toast" style={{background:colors[t.type],cursor:"pointer"}} onClick={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}>
          <span style={{width:20,height:20,borderRadius:"50%",background:"rgba(255,255,255,.25)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>{icons[t.type]}</span>
          {t.msg}
        </div>
      ))}
    </div>
  </ToastCtx.Provider>;
}
const useToast=()=>useContext(ToastCtx);

// Animated counter hook
function useCountUp(target,duration=800){
  const [count,setCount]=useState(0);
  useEffect(()=>{
    if(target===0){setCount(0);return;}
    let start=0;
    const step=target/((duration/16));
    const timer=setInterval(()=>{
      start+=step;
      if(start>=target){setCount(target);clearInterval(timer);}
      else setCount(Math.floor(start));
    },16);
    return()=>clearInterval(timer);
  },[target]);
  return count;
}
function AnimatedStat({value,color,icon,label,delay}){
  const count=useCountUp(value,700);
  return(
    <div className="card card-hover fade-up" style={{padding:"20px 22px",display:"flex",alignItems:"center",gap:16,animationDelay:`${delay*0.1}s`,cursor:"default"}}>

        onMouseEnter={e=>e.currentTarget.style.transform="scale(1.15) rotate(-8deg)"}

      <div>
        <div className="stat-num" style={{fontFamily:"Syne,sans-serif",fontSize:30,fontWeight:800,color:"var(--tx)",lineHeight:1,animationDelay:`${delay*0.1+0.2}s`}}>{count}</div>
        <div style={{fontSize:12.5,color:"var(--tx2)",marginTop:4}}>{label}</div>
      </div>

  );
}

function DashboardPage({onNav}){
  const {user}=useAuth();
  const {projects,tasks}=useData();
  const myP=user?.role==="admin"?projects:projects.filter(p=>p.members?.some(m=>(m._id||m)===user?._id));
  const myT=user?.role==="admin"?tasks:tasks.filter(t=>(t.assignee?._id||t.assignee)===user?._id);
  const overdue=myT.filter(isOverdue);
  const done=myT.filter(t=>t.status==="completed");
  const inProg=myT.filter(t=>t.status==="in-progress");
  const statusData=["todo","in-progress","review","completed"].map(s=>({label:SC[s].label,count:myT.filter(t=>t.status===s).length,color:SC[s].c}));
  const maxC=Math.max(...statusData.map(d=>d.count),1);
  const hour=new Date().getHours();
  const greeting=hour<12?"Good morning":hour<18?"Good afternoon":"Good evening";

  return(
    <div className="main-content" style={{padding:"24px 28px",maxWidth:1180}}>
      {/* Header */}
      <div className="fade-up" style={{marginBottom:28,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
        <div>
          <h2 style={{fontFamily:"Syne,sans-serif",fontSize:27,fontWeight:800,color:"var(--tx)",letterSpacing:"-.5px"}}>{greeting}, {user?.name?.split(" ")[0]} 👋</h2>
          <p style={{color:"var(--tx2)",fontSize:14,marginTop:5}}>Here's what's happening with your projects today.</p>
        </div>
        <button className="btn btn-primary" onClick={()=>onNav("projects")}>✦ New Project</button>
      </div>

      {/* Stat Cards */}
      <div className="stats-grid" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:24}}>
        <AnimatedStat icon="📁" label="Total Projects" value={myP.length} color="#6366f1" delay={0}/>
        <AnimatedStat icon="✅" label="Tasks Done" value={done.length} color="#10b981" delay={1}/>
        <AnimatedStat icon="🔄" label="In Progress" value={inProg.length} color="#3b82f6" delay={2}/>
        <AnimatedStat icon="⚠️" label="Overdue" value={overdue.length} color="#ef4444" delay={3}/>
      </div>

      {/* Charts */}
      <div className="charts-grid" style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:16,marginBottom:20}}>
        <div className="card fade-up" style={{padding:"22px 24px",animationDelay:".32s"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:15,color:"var(--tx)",marginBottom:20}}>Tasks by Status</div>
          <div style={{display:"flex",flexDirection:"column",gap:13}}>
            {statusData.map(d=>(
              <div key={d.label} style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{width:84,fontSize:12,color:"var(--tx2)",flexShrink:0,fontWeight:500}}>{d.label}</span>
                <div style={{flex:1,height:26,background:"var(--bg3)",borderRadius:8,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(d.count/maxC)*100}%`,background:d.color,borderRadius:8,transition:"width 1s ease",display:"flex",alignItems:"center",justifyContent:"flex-end",paddingRight:9}}>
                    {d.count>0&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>{d.count}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div className="card fade-up" style={{padding:"22px 24px",animationDelay:".4s"}}>
          <div style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:15,color:"var(--tx)",marginBottom:20}}>Priority Split</div>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {Object.entries(PC).map(([key,c])=>{
              const count=myT.filter(t=>t.priority===key).length;
              return(
                <div key={key} style={{display:"flex",alignItems:"center",gap:10}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:c.c,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:12,color:"var(--tx2)",fontWeight:500}}>{c.l}</span>
                  <div style={{width:72,height:5,background:"var(--bg3)",borderRadius:4,overflow:"hidden"}}>

                  <span style={{fontSize:12,fontWeight:700,color:"var(--tx)",width:18,textAlign:"right"}}>{count}</span>
                </div>
              );
            })}

          {myT.length===0&&<div style={{color:"var(--tx3)",fontSize:13,textAlign:"center",marginTop:20}}>No tasks yet</div>}
        </div>
      </div>

      {/* Recent Projects */}
      <div className="card fade-up" style={{padding:"22px 24px",marginBottom:16,animationDelay:".48s"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>

        {myP.length===0?(
          <div className="empty"><div className="empty-icon">📭</div><div className="empty-title">No projects yet</div>

        ):myP.slice(0,5).map(p=>(
          <div key={p._id} onClick={()=>onNav("project-detail",p._id)}
            style={{display:"flex",alignItems:"center",gap:14,padding:"11px 10px",borderRadius:13,cursor:"pointer",transition:"background .15s",marginBottom:3}}
            onMouseEnter={e=>e.currentTarget.style.background="var(--bg3)"}
            onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
            <div style={{width:38,height:38,borderRadius:11,background:p.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:16,flexShrink:0,boxShadow:`0 3px 10px ${p.color||"#6366f1"}50`}}>{p.name[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:"var(--tx)",marginBottom:6,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
              <ProgBar value={p.progress} color={p.color}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              <span style={{fontSize:11.5,color:"var(--tx2)",fontWeight:500}}>{p.progress||0}%</span>
              <span className="badge" style={{color:PSC[p.status]?.c,background:PSC[p.status]?.bg,textTransform:"capitalize",fontSize:10}}>{p.status.replace("-"," ")}</span>
            </div>
          </div>
        ))}
      </div>

      {overdue.length>0&&(
        <div className="fade-up" style={{padding:"14px 18px",borderRadius:14,background:"#fff1f2",border:"1.5px solid #fecdd3",display:"flex",alignItems:"center",gap:14}}>
          <span style={{fontSize:22,flexShrink:0}}>🚨</span>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:"#dc2626"}}>Overdue Tasks</div>
            <div style={{fontSize:13,color:"#b91c1c"}}>You have <strong>{overdue.length}</strong> overdue {overdue.length===1?"task":"tasks"} needing attention.</div>
          </div>
        </div>
      )}
    </div>
  );
}

        </div>
        <select className="input" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:160}}>
          <option value="">All Status</option>
          <option value="planning">Planning</option><option value="active">Active</option>
          <option value="on-hold">On Hold</option><option value="completed">Completed</option>

          {user?.role==="admin"&&<button className="btn btn-primary" onClick={()=>setModal(true)}>Create your first project</button>}
        </div>
      ):(

          {visible.map((p,i)=>(
            <div key={p._id} className="card card-hover fade-up" style={{padding:"20px 22px",animationDelay:`${i*0.06}s`}}>              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:42,height:42,borderRadius:13,background:p.color||"#6366f1",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:18,boxShadow:`0 4px 14px ${p.color||"#6366f1"}50`}}>{p.name[0]}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:14.5,color:"var(--tx)",marginBottom:4}}>{p.name}</div>
                    <span className="badge" style={{color:PSC[p.status]?.c,background:PSC[p.status]?.bg,textTransform:"capitalize",fontSize:10}}>{p.status.replace("-"," ")}</span>
                  </div>
                </div>
                {user?.role==="admin"&&(
                  <div style={{display:"flex",gap:4}}>

                    <button onClick={e=>{e.stopPropagation();if(confirm("Delete this project?")){{deleteProject(p._id);add("Project deleted");}}}} className="btn btn-danger" style={{padding:"4px 8px",fontSize:12,borderRadius:8}}>🗑️</button>
                  </div>
                )}

              {p.description&&<p style={{fontSize:12.5,color:"var(--tx2)",marginBottom:14,lineHeight:1.6,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{p.description}</p>}
              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--tx2)",marginBottom:7}}>
                  <span style={{fontWeight:500}}>Progress</span>
                  <span style={{fontWeight:700,color:"var(--tx)"}}>{p.progress||0}%</span>
                </div>
                <ProgBar value={p.progress} color={p.color} h={7}/>
              </div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:12,borderTop:"1px solid var(--bd)"}}>
                <div style={{display:"flex",alignItems:"center",gap:14,fontSize:12,color:"var(--tx2)"}}>
                  <span>👥 {p.members?.length||0}</span>
                  {p.deadline&&<span>📅 {new Date(p.deadline).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>}

  );

        {/* Tasks */}
        <div className="card fade-up" style={{padding:"18px 22px",animationDelay:".24s"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <h3 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:15,color:"var(--tx)"}}>Tasks ({projectTasks.length})</h3>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:"var(--tx3)",fontSize:13}}>🔍</span>
                <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search..." style={{paddingLeft:32,width:160,fontSize:13,padding:"7px 10px 7px 32px"}}/>
              </div>
              <select className="input" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:130,fontSize:13}}>
                <option value="">All Status</option>
                <option value="todo">To Do</option><option value="in-progress">In Progress</option>
                <option value="review">Review</option><option value="completed">Completed</option>
              </select>
            </div>
          </div>
          {projectTasks.length===0?(
            <div className="empty" style={{padding:"40px 20px"}}>
              <div className="empty-icon">📋</div><div className="empty-title">No tasks yet</div>
              <button className="btn btn-primary" onClick={()=>setTaskModal(true)}>Add your first task</button>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {projectTasks.map(t=>(
                <div key={t._id} onClick={()=>setSelectedTask(t===selectedTask?null:t)} style={{cursor:"pointer",outline:selectedTask?._id===t._id?"2px solid #6366f1":"none",borderRadius:13}}>
                  <TaskCard task={t}
                    onEdit={(e)=>{e.stopPropagation?.();setEditingTask(t);setTaskModal(true);}}
                    onDelete={(e)=>{e.stopPropagation?.();deleteTask(t._id);add("Task deleted");if(selectedTask?._id===t._id)setSelectedTask(null);}}
                    onStatusChange={(status)=>updateTask(t._id,{status})}/>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Detail Panel */}
        {selectedTask&&(
          <div className="card fade-up" style={{padding:"18px 20px",maxHeight:600,overflow:"auto",animationDelay:".1s"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h4 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:14,color:"var(--tx)"}}>Task Details</h4>
              <button onClick={()=>setSelectedTask(null)} style={{background:"none",border:"none",color:"var(--tx3)",cursor:"pointer",fontSize:18}}>✕</button>
            </div>
            <div style={{fontSize:15,fontWeight:700,color:"var(--tx)",marginBottom:8,lineHeight:1.4}}>{selectedTask.title}</div>
            {selectedTask.description&&<p style={{fontSize:13,color:"var(--tx2)",marginBottom:12,lineHeight:1.6}}>{selectedTask.description}</p>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
              <PBadge p={selectedTask.priority}/><SBadge s={selectedTask.status}/>
              {selectedTask.dueDate&&<span className="badge" style={{background:"var(--bg3)",color:"var(--tx2)"}}>📅 {fmtDate(selectedTask.dueDate)}</span>}
            </div>
            {selectedTask.assignee&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,padding:"10px 12px",background:"var(--bg3)",borderRadius:10}}>
              <Avatar user={selectedTask.assignee} size={28}/><div><div style={{fontSize:12.5,fontWeight:600,color:"var(--tx)"}}>{selectedTask.assignee.name}</div><div style={{fontSize:11,color:"var(--tx3)",textTransform:"capitalize"}}>{selectedTask.assignee.role}</div></div>
            </div>}
            {selectedTask.labels?.length>0&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:16}}>{selectedTask.labels.map(l=><span key={l} className="tag">{l}</span>)}</div>}
            <div style={{borderTop:"1px solid var(--bd)",paddingTop:14}}>
              <div style={{fontWeight:700,fontSize:13,color:"var(--tx)",marginBottom:12}}>💬 Comments ({taskComments.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
                {taskComments.map(c=>(
                  <div key={c._id} style={{display:"flex",gap:9}}>
                    <Avatar user={c.author} size={26}/>
                    <div style={{flex:1,background:"var(--bg3)",borderRadius:10,padding:"8px 12px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:12,fontWeight:700,color:"var(--tx)"}}>{c.author.name}</span>
                        {(user?._id===c.author._id||user?.role==="admin")&&<button onClick={()=>deleteComment(c._id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--tx3)",fontSize:12}}>✕</button>}
                      </div>
                      <div style={{fontSize:12.5,color:"var(--tx2)",lineHeight:1.5}}>{c.content}</div>
                    </div>
                  </div>
                ))}
                {taskComments.length===0&&<div style={{fontSize:12,color:"var(--tx3)",textAlign:"center",padding:"12px 0"}}>No comments yet</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                <input className="input" value={commentText} onChange={e=>setCommentText(e.target.value)} placeholder="Add a comment..." style={{fontSize:13,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&commentText.trim()){addComment(selectedTask._id,commentText.trim(),user);setCommentText("");}}}/>
                <button className="btn btn-primary" onClick={()=>{if(commentText.trim()){addComment(selectedTask._id,commentText.trim(),user);setCommentText("");}}} style={{padding:"8px 12px",borderRadius:10,flexShrink:0}}>↑</button>
              </div>
            </div>
          </div>
        )}
      </div>

      <TaskModal open={taskModal} onClose={()=>{setTaskModal(false);setEditingTask(null);}} initial={editingTask} projectId={projectId}
        onSave={(data)=>{if(editingTask){updateTask(editingTask._id,data);add("Task updated!");}else{createTask(data,user);add("Task created!");}}}/>
    </div>
  );
}

// ═══════════════════════════════════════
// PAGE: KANBAN BOARD
// ═══════════════════════════════════════
function BoardPage({projectId,onNav}){
  const {user}=useAuth();
  const {projects,tasks,createTask,updateTask,deleteTask}=useData();
  const {add}=useToast();
  const [taskModal,setTaskModal]=useState(false);
  const [editingTask,setEditingTask]=useState(null);
  const [dragOver,setDragOver]=useState(null);
  const [defaultStatus,setDefaultStatus]=useState("todo");

  const project=projects.find(p=>p._id===projectId);
  const projectTasks=tasks.filter(t=>t.project===projectId);

  const COLS=[
    {id:"todo",label:"To Do",color:"var(--bg3)",dot:"#64748b"},
    {id:"in-progress",label:"In Progress",color:"rgba(59,130,246,.06)",dot:"#3b82f6"},
    {id:"review",label:"Review",color:"rgba(245,158,11,.06)",dot:"#f59e0b"},
    {id:"completed",label:"Completed",color:"rgba(16,185,129,.06)",dot:"#10b981"},
  ];

  const handleDrop=(e,colId)=>{
    e.preventDefault();
    const taskId=e.dataTransfer.getData("taskId");
    if(taskId){updateTask(taskId,{status:colId});}
    setDragOver(null);
  };

  return(
    <div className="main-content" style={{padding:"24px 28px",maxWidth:1400}}>
      <div className="fade-up" style={{display:"flex",alignItems:"center",gap:14,marginBottom:24,flexWrap:"wrap"}}>
        <button className="btn btn-secondary" onClick={()=>onNav("project-detail",projectId)} style={{padding:"8px 12px",borderRadius:10,fontSize:13}}>← Back</button>
        <div style={{flex:1}}>
          <h2 style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"var(--tx)",letterSpacing:"-.4px"}}>{project?.name||"Board"}</h2>
          <p style={{fontSize:12,color:"var(--tx2)"}}>Kanban Board • Drag & drop tasks between columns</p>
        </div>
        <button className="btn btn-primary" onClick={()=>{setEditingTask(null);setTaskModal(true);}}>+ Add Task</button>
      </div>

      <div className="kanban-board" style={{display:"flex",gap:16,overflowX:"auto",paddingBottom:16,minHeight:"65vh"}}>
        {COLS.map(col=>{
          const colTasks=projectTasks.filter(t=>t.status===col.id);
          return(
            <div key={col.id} className={`kanban-col${dragOver===col.id?" drag-over":""}`} style={{background:col.color}}
              onDragOver={e=>{e.preventDefault();setDragOver(col.id);}}
              onDragLeave={()=>setDragOver(null)}
              onDrop={e=>handleDrop(e,col.id)}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"0 2px"}}>
                <span style={{width:8,height:8,borderRadius:"50%",background:col.dot,display:"block",flexShrink:0}}/>
                <span style={{fontSize:13.5,fontWeight:700,color:"var(--tx2)",flex:1}}>{col.label}</span>
                <span style={{fontSize:11,fontWeight:600,color:"var(--tx3)",background:"var(--bg2)",padding:"2px 8px",borderRadius:99,border:"1px solid var(--bd)"}}>{colTasks.length}</span>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,minHeight:80}}>
                {colTasks.map(t=>(
                  <div key={t._id} draggable onDragStart={e=>e.dataTransfer.setData("taskId",t._id)}>
                    <TaskCard task={t} compact
                      onEdit={()=>{setEditingTask(t);setTaskModal(true);}}
                      onDelete={()=>{deleteTask(t._id);add("Task deleted");}}
                      onStatusChange={status=>updateTask(t._id,{status})}
                      draggable={true} onDragStart={e=>e.dataTransfer.setData("taskId",t._id)}/>
                  </div>
                ))}
              </div>
              <button onClick={()=>{setDefaultStatus(col.id);setEditingTask(null);setTaskModal(true);}}
                style={{width:"100%",marginTop:8,padding:"8px",borderRadius:10,border:"2px dashed var(--bd)",background:"transparent",color:"var(--tx3)",fontSize:12,cursor:"pointer",transition:"all .15s",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="#6366f1";e.currentTarget.style.color="#6366f1";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--bd)";e.currentTarget.style.color="var(--tx3)";}}>
                + Add task
              </button>
            </div>
          );
        })}
      </div>

      <TaskModal open={taskModal} onClose={()=>{setTaskModal(false);setEditingTask(null);}} initial={editingTask?{...editingTask}:null} projectId={projectId}
        onSave={(data)=>{
          const finalData={...data,status:editingTask?data.status:defaultStatus};
          if(editingTask){updateTask(editingTask._id,finalData);add("Task updated!");}
          else{createTask(finalData,user);add("Task created!");}
        }}/>
    </div>
  );
}

// ═══════════════════════════════════════
// PAGE: PROFILE
// ═══════════════════════════════════════
function ProfilePage(){
  const {user,updateUser,logout}=useAuth();
  const {add}=useToast();
  const [tab,setTab]=useState("profile");
  const [form,setForm]=useState({name:user?.name||"",bio:user?.bio||"",avatar:user?.avatar||""});
  const [pwForm,setPwForm]=useState({currentPassword:"",newPassword:"",confirmPassword:""});
  const [saving,setSaving]=useState(false);
  const [pwSaving,setPwSaving]=useState(false);

  const saveProfile=(e)=>{
    e.preventDefault();setSaving(true);
    setTimeout(()=>{updateUser({name:form.name,bio:form.bio,avatar:form.avatar});add("Profile updated! ✨");setSaving(false);},600);
  };
  const savePassword=(e)=>{
    e.preventDefault();
    if(pwForm.newPassword!==pwForm.confirmPassword)return add("Passwords don't match","error");
    if(pwForm.currentPassword!==MOCK_USERS.find(u=>u._id===user?._id)?.password)return add("Current password incorrect","error");
    setPwSaving(true);
    setTimeout(()=>{add("Password updated!");setPwSaving(false);setPwForm({currentPassword:"",newPassword:"",confirmPassword:""});},600);
  };

  const {tasks}=useData();
  const myTasks=tasks.filter(t=>(t.assignee?._id||t.assignee)===user?._id);
  const done=myTasks.filter(t=>t.status==="completed").length;
  const inprog=myTasks.filter(t=>t.status==="in-progress").length;

  return(
    <div className="main-content" style={{padding:"24px 28px",maxWidth:680}}>
      {/* Avatar section */}
      <div className="card fade-up" style={{padding:"24px 28px",display:"flex",alignItems:"center",gap:20,marginBottom:20,flexWrap:"wrap"}}>
        <div style={{position:"relative"}}>
          <div style={{width:80,height:80,borderRadius:22,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:32,fontWeight:700,overflow:"hidden",boxShadow:"0 8px 24px rgba(99,102,241,.35)"}}>
            {form.avatar?<img src={form.avatar} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:user?.name?.[0]?.toUpperCase()}
          </div>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <h3 style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:800,color:"var(--tx)"}}>{user?.name}</h3>
          <p style={{fontSize:13,color:"var(--tx2)",marginTop:2}}>{user?.email}</p>
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
            <span className="badge" style={{background:"rgba(99,102,241,.12)",color:"#6366f1",textTransform:"capitalize"}}>{user?.role}</span>
            <span className="badge" style={{background:"rgba(16,185,129,.12)",color:"#10b981"}}>✅ {done} done</span>
            <span className="badge" style={{background:"rgba(59,130,246,.12)",color:"#3b82f6"}}>🔄 {inprog} active</span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="fade-up" style={{display:"flex",gap:4,padding:6,background:"var(--bg3)",borderRadius:16,marginBottom:20,animationDelay:".08s"}}>
        {[["profile","👤 Profile"],["password","🔒 Security"]].map(([k,l])=>(
          <button key={k} className={`tab-btn${tab===k?" active":""}`} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      {/* Profile Form */}
      {tab==="profile"&&(
        <div className="card fade-up" style={{padding:"24px 28px",animationDelay:".16s"}}>
          <h4 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16,color:"var(--tx)",marginBottom:20}}>Edit Profile</h4>
          <form onSubmit={saveProfile}>
            <div style={{marginBottom:14}}>
              <label className="flabel">Full Name</label>
              <input className="input" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} required/>
            </div>
            <div style={{marginBottom:14}}>
              <label className="flabel">Avatar URL</label>
              <input className="input" value={form.avatar} onChange={e=>setForm(f=>({...f,avatar:e.target.value}))} placeholder="https://..."/>
            </div>
            <div style={{marginBottom:20}}>
              <label className="flabel">Bio</label>
              <textarea className="input" value={form.bio} onChange={e=>setForm(f=>({...f,bio:e.target.value}))} rows={3} placeholder="Tell us about yourself..." style={{resize:"none"}}/>
            </div>
            <button type="submit" className="btn btn-primary" disabled={saving}>
              {saving&&<span className="spinner"/>}
              {saving?"Saving...":"💾 Save Changes"}
            </button>
          </form>
        </div>
      )}

      {/* Password Form */}
      {tab==="password"&&(
        <div className="card fade-up" style={{padding:"24px 28px",animationDelay:".16s"}}>
          <h4 style={{fontFamily:"Syne,sans-serif",fontWeight:700,fontSize:16,color:"var(--tx)",marginBottom:20}}>Change Password</h4>
          <form onSubmit={savePassword}>
            {[["currentPassword","Current Password"],["newPassword","New Password"],["confirmPassword","Confirm New Password"]].map(([field,label])=>(
              <div key={field} style={{marginBottom:14}}>
                <label className="flabel">{label}</label>
                <input className="input" type="password" value={pwForm[field]} onChange={e=>setPwForm(f=>({...f,[field]:e.target.value}))} required/>
              </div>
            ))}
            <button type="submit" className="btn btn-primary" disabled={pwSaving}>
              {pwSaving&&<span className="spinner"/>}
              {pwSaving?"Updating...":"🔒 Update Password"}
            </button>
          </form>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════
function App(){
  const {user,loading}=useAuth();
  const [page,setPage]=useState("login");
  const [pageData,setPageData]=useState(null);
  const [sidebarCollapsed,setSidebarCollapsed]=useState(false);
  const [mobileSidebarOpen,setMobileSidebarOpen]=useState(false);

  useEffect(()=>{
    if(!loading){
      if(user&&(page==="login"||page==="register"))setPage("dashboard");
      else if(!user&&page!=="register")setPage("login");
    }
  },[user,loading]);

  const navigate=(p,data=null)=>{setPage(p);setPageData(data);setMobileSidebarOpen(false);};

  if(loading)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{width:44,height:44,borderRadius:14,background:"linear-gradient(135deg,#6366f1,#7c3aed)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,margin:"0 auto 12px"}}>⚡</div>
        <div className="spinner" style={{margin:"0 auto",borderColor:"rgba(99,102,241,.2)",borderTopColor:"#6366f1"}}/>
      </div>
    </div>
  );

  if(!user){
    if(page==="register")return<RegisterPage onNav={navigate}/>;
    return<LoginPage onNav={navigate}/>;
  }

  const renderPage=()=>{
    const key=page+(pageData||"");
    const inner=(()=>{
      switch(page){
        case "dashboard": return<DashboardPage onNav={navigate}/>;
        case "projects": return<ProjectsPage onNav={navigate}/>;
        case "project-detail": return<ProjectDetailPage projectId={pageData} onNav={navigate}/>;
        case "board": return<BoardPage projectId={pageData} onNav={navigate}/>;
        case "profile": return<ProfilePage/>;
        default: return<DashboardPage onNav={navigate}/>;
      }
    })();
    return <div key={key} className="page-enter">{inner}</div>;
  };

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg)"}}>
      {/* Mobile overlay */}
      {mobileSidebarOpen&&(
        <div onClick={()=>setMobileSidebarOpen(false)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex"}}>
          <div onClick={e=>e.stopPropagation()} style={{position:"fixed",top:0,left:0,height:"100%",zIndex:250,width:260}}>
            <Sidebar page={page} onNav={navigate} mobile={true} onClose={()=>setMobileSidebarOpen(false)}/>
          </div>
        </div>
      )}

      {/* Desktop sidebar */}
      <div className="hide-mobile" style={{height:"100vh",flexShrink:0}}>
        <Sidebar page={page} onNav={navigate} collapsed={sidebarCollapsed}/>
      </div>

      {/* Main */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        <Navbar page={page} onMenuClick={()=>setMobileSidebarOpen(true)} onSidebarToggle={()=>setSidebarCollapsed(s=>!s)} sidebarOpen={!sidebarCollapsed} onNav={navigate}/>
        <main style={{flex:1,overflowY:"auto"}}>
          {renderPage()}
        </main>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════
// ROOT
// ═══════════════════════════════════════
function Root(){
  return(
    <ThemeProvider>
      <ToastProvider>
        <AuthProvider>
          <DataProvider>
            <App/>
          </DataProvider>
        </AuthProvider>
      </ToastProvider>
    </ThemeProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
